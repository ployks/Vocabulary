<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <header>
            <h1>Vocab Vault</h1>
            <p>Define, Translate, and Organize your Vocabulary</p>
        </header>

        <section class="search-section glass">
            <div class="input-wrapper" style="position: relative; width: 100%;">
                <div class="input-group">
                    <input type="text" id="wordInput" placeholder="Enter an English word..." autocomplete="off">
                    <button id="translateBtn">Translate</button>
                </div>
                <div id="autocompleteDropdown" class="autocomplete-dropdown hidden"></div>
            </div>
            <div id="loading" class="hidden">Translating...</div>
            
            <div id="didYouMeanBox" class="did-you-mean hidden">
                Did you mean: <span id="didYouMeanWord">word</span>?
            </div>

            <div id="resultCard" class="result-card hidden glass">
                <div class="result-content">
                    <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                        <h2 id="resultWord" style="margin-bottom: 0;">Word</h2>
                        <button id="speakBtn" class="speak-btn" title="Listen to pronunciation">🔊</button>
                    </div>
                    <p id="resultMeaning">Meaning</p>
                    <input type="text" id="manualMeaning" class="hidden" placeholder="Edit meaning...">
                </div>
                <div class="result-actions">
                    <button id="editBtn" class="btn-secondary">Edit</button>
                    <button id="saveBtn" class="btn-primary">Save to Vault</button>
                </div>
            </div>
        </section>

        <section class="dictionary-section glass">
            <h2>Your Dictionary</h2>
            <div class="alphabet-nav" id="alphabetNav">
                <!-- A to Z buttons generated by JS -->
            </div>
            <div class="table-container">
                <table id="vocabTable">
                    <thead>
                        <tr>
                            <th>Word</th>
                            <th>Translation / Meaning</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="vocabTbody">
                        <!-- Rows generated by JS -->
                    </tbody>
                </table>
            </div>
            <div id="emptyState" class="empty-state hidden">
                <p>No words found for this letter.</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
